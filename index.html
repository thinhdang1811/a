<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Thinh Dang</title>
  <style>
    :root {
      --bg: #111827;
      --panel: #1f2937;
      --panel-2: #0f172a;
      --text: #e5e7eb;
      --muted: #94a3b8;
      --key: #93c5fd;
      --string: #fca5a5;
      --accent: #34d399;
      --line: rgba(255,255,255,0.08);
      --shadow: 0 20px 50px rgba(0,0,0,0.45);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: Consolas, "Courier New", monospace;
      background:
        radial-gradient(circle at top left, rgba(52,211,153,0.08), transparent 30%),
        radial-gradient(circle at bottom right, rgba(96,165,250,0.08), transparent 25%),
        var(--bg);
      color: var(--text);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 32px 16px;
    }

    .window {
      width: min(920px, 100%);
      background: rgba(15, 23, 42, 0.9);
      border: 1px solid var(--line);
      border-radius: 20px;
      overflow: hidden;
      box-shadow: var(--shadow);
      backdrop-filter: blur(10px);
    }

    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 18px;
      background: rgba(255,255,255,0.03);
      border-bottom: 1px solid var(--line);
    }

    .traffic {
      display: flex;
      gap: 8px;
    }

    .dot {
      width: 12px;
      height: 12px;
      border-radius: 50%;
      display: inline-block;
    }

    .red { background: #fb7185; }
    .yellow { background: #fbbf24; }
    .green { background: #34d399; }

    .title {
      color: var(--muted);
      font-size: 13px;
      letter-spacing: 0.03em;
    }

    .content {
      padding: 28px 24px 30px;
      overflow-x: auto;
    }

    pre {
      margin: 0;
      white-space: pre-wrap;
      word-break: break-word;
      font-size: clamp(15px, 2.1vw, 22px);
      line-height: 1.65;
    }

    .key { color: var(--key); }
    .string { color: var(--string); }
    .muted { color: var(--muted); }
    .link {
      color: #7dd3fc;
      text-decoration: underline;
      text-underline-offset: 3px;
    }

    .cursor {
      display: inline-block;
      width: 10px;
      animation: blink 1s steps(1) infinite;
      color: var(--accent);
    }

    @keyframes blink {
      50% { opacity: 0; }
    }

    .footer {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      padding: 14px 18px;
      border-top: 1px solid var(--line);
      color: var(--muted);
      font-size: 12px;
      background: rgba(255,255,255,0.02);
      flex-wrap: wrap;
    }

    .pill {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 6px 10px;
      border: 1px solid var(--line);
      border-radius: 999px;
      background: rgba(255,255,255,0.02);
    }

    @media (max-width: 640px) {
      .content { padding: 20px 16px 24px; }
      .topbar, .footer { padding-left: 14px; padding-right: 14px; }
    }
  </style>
</head>
<body>
  <main class="window">
    <div class="topbar">
      <div class="traffic">
        <span class="dot red"></span>
        <span class="dot yellow"></span>
        <span class="dot green"></span>
      </div>
      <div class="title">about.thinh</div>
      <div class="title">portfolio.json</div>
    </div>

    <section class="content">
<pre id="code"></pre>
    </section>

    <div class="footer">
      <span class="pill">Open to opportunities</span>
      <span class="pill">Perth, WA</span>
      <span class="pill">Civil • Mining • Power Apps</span>
    </div>
  </main>

  <script>
    const code = document.getElementById('code');

    const lines = [
      '{',
      '  <span class="key">name</span>: <span class="string">"Thinh Dang 🇻🇳 🇦🇺"</span>,',
      '  <span class="key">description</span>: <span class="string">"Civil engineering student with mining, site, and app-building experience."</span>,',
      '',
      '  <span class="key">focus</span>: [',
      '    <span class="string">"civil engineering"</span>,',
      '    <span class="string">"mining operations"</span>,',
      '    <span class="string">"Power Apps & automation"</span>',
      '  ],',
      '',
      '  <span class="key">projects</span>: [',
      '    <span class="string">"Drill PLOD App"</span>,',
      '    <span class="string">"QAQC Design App"</span>,',
      '    <span class="string">"Engineering coursework & reports"</span>',
      '  ],',
      '',
      '  <span class="key">experience</span>: {',
      '    <span class="key">site</span>: <span class="string">"FIFO mining support"</span>,',
      '    <span class="key">tools</span>: [<span class="string">"Power Apps"</span>, <span class="string">"Power Automate"</span>, <span class="string">"Excel"</span>],',
      '    <span class="key">location</span>: <span class="string">"Perth, Western Australia"</span>',
      '  },',
      '',
      '  <span class="key">links</span>: {',
      '    <span class="key">linkedin</span>: <a class="link" href="https://www.linkedin.com" target="_blank">"https://www.linkedin.com/in/dptthinh1811/"</a>,',
      '    <span class="key">email</span>: <a class="link" href="mailto:your@email.com">"dptthinh1811@gmail.com"</a>,',
      '    <span class="key">resume</span>: <span class="muted">"coming soon"</span>',
      '  },',
      '',
      '  <span class="key">quote</span>: [',
      '    <span class="string">"Keep learning, keep building."</span>',
      '  ]',
      '} <span class="cursor">|</span>'
    ];

    let currentLine = 0;
    function typeLine() {
      if (currentLine < lines.length) {
        code.innerHTML += lines[currentLine] + '\n';
        currentLine++;
        setTimeout(typeLine, currentLine < 4 ? 220 : 120);
      }
    }

    typeLine();
  </script>
</body>
</html>
